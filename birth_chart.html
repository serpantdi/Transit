<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vedic Birth Chart Workspace</title>
  <style>
    :root {
      --bg-main: #0f172a;
      --bg-card: #1e293b;
      --bg-card-hover: #334155;
      --accent: #f59e0b;
      --accent-hover: #d97706;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border: #334155;
      --gold: #fbbf24;
      --blue: #38bdf8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      padding: 20px;
      min-height: 100vh;
    }

    .header {
      text-align: center;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      color: var(--gold);
      font-size: 2rem;
      margin-bottom: 5px;
    }

    .header p { color: var(--text-muted); font-size: 0.95rem; }

    .input-section {
      background: var(--bg-card);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-bottom: 25px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      align-items: end;
    }

    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; }
    .form-group input, .form-group select {
      background: #0f172a;
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 10px;
      border-radius: 6px;
      outline: none;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--accent); }

    .btn-calc {
      background: var(--accent);
      color: #000;
      font-weight: 700;
      border: none;
      padding: 11px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-calc:hover { background: var(--accent-hover); }

    .varga-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 25px;
      justify-content: center;
    }

    .varga-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.2s;
    }

    .varga-btn.active, .varga-btn:hover {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
      gap: 20px;
      margin-bottom: 25px;
    }

    .chart-card {
      background: var(--bg-card);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .chart-card h3 {
      color: var(--gold);
      margin-bottom: 15px;
      font-size: 1.1rem;
      width: 100%;
      text-align: left;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }

    .south-chart {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      width: 360px;
      height: 360px;
      border: 2px solid var(--gold);
      background: #0f172a;
      position: relative;
    }

    .cell {
      border: 1px solid #334155;
      padding: 4px;
      font-size: 0.75rem;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: flex-start;
      overflow: hidden;
    }

    .cell-center {
      grid-column: 2 / 4;
      grid-row: 2 / 4;
      border: 1px solid var(--gold);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: #1e293b;
      color: var(--gold);
      font-weight: bold;
      font-size: 0.9rem;
      padding: 10px;
    }

    .sign-num {
      position: absolute;
      bottom: 2px;
      right: 4px;
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    .lagna-badge {
      background: var(--accent);
      color: #000;
      font-weight: 800;
      font-size: 0.65rem;
      padding: 1px 4px;
      border-radius: 3px;
      margin-bottom: 2px;
    }

    .planet-tag {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--blue);
      margin-top: 1px;
    }

    .vargottama { color: #4ade80 !important; font-weight: 800; }

    .table-container {
      background: var(--bg-card);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 20px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 0.9rem;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    th { color: var(--gold); font-weight: 600; }
    tr:hover { background: var(--bg-card-hover); }

    .badge {
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .badge-vargottama { background: #166534; color: #4ade80; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Janam Kundali & Parashari Shodashavarga</h1>
    <p>Accurate Varga Lagna & Planetary Divisions (Jagannatha Hora Standard)</p>
  </div>

  <div class="input-section">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" value="User">
    </div>
    <div class="form-group">
      <label>Date of Birth</label>
      <input type="date" id="dob" value="1995-05-15">
    </div>
    <div class="form-group">
      <label>Time of Birth (24h)</label>
      <input type="time" id="tob" value="14:30">
    </div>
    <div class="form-group">
      <label>Timezone (UTC offset)</label>
      <input type="number" step="0.5" id="tz" value="5.5">
    </div>
    <button class="btn-calc" onclick="calculateChart()">Plot Natal Wheel</button>
  </div>

  <div class="varga-selector" id="vargaButtons">
    <!-- Generated dynamically -->
  </div>

  <div class="dashboard-grid">
    <div class="chart-card">
      <h3><span>D1 - Rashi Chart (Main Birth Chart)</span></h3>
      <div id="d1Chart" class="south-chart"></div>
    </div>
    <div class="chart-card">
      <h3>
        <span id="vargaTitle">D9 - Navamsa Chart</span>
        <span style="font-size: 0.8rem; color: var(--accent);" id="vargaLagnaInfo"></span>
      </h3>
      <div id="vargaChart" class="south-chart"></div>
    </div>
  </div>

  <div class="table-container">
    <h3 style="color: var(--gold); margin-bottom: 15px;">Planetary Details & Varga Positions</h3>
    <table>
      <thead>
        <tr>
          <th>Planet</th>
          <th>D1 Longitude</th>
          <th>D1 Sign</th>
          <th>Selected Varga Sign</th>
          <th>House (Selected Varga)</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="planetTable">
        <!-- Generated dynamically -->
      </tbody>
    </table>
  </div>

  <script>
    const SIGNS = ["Aries", "Taurus", "Gemini", "Cancer", "Leo", "Virgo", "Libra", "Scorpio", "Sagittarius", "Capricorn", "Aquarius", "Pisces"];

    const VARGAS = {
      1: { name: "D1 - Rashi", desc: "Main Birth Chart" },
      2: { name: "D2 - Hora", desc: "Wealth & Wealth Creation" },
      3: { name: "D3 - Drekkana", desc: "Siblings & Courage" },
      4: { name: "D4 - Chaturthamsa", desc: "Property & Fortunes" },
      7: { name: "D7 - Saptamsa", desc: "Children & Progeny" },
      9: { name: "D9 - Navamsa", desc: "Spouse, Marriage & Dharma" },
      10: { name: "D10 - Dasamsa", desc: "Career & Profession" },
      12: { name: "D12 - Dwadasamsa", desc: "Parents & Ancestors" },
      16: { name: "D16 - Shodasamsa", desc: "Vehicles & Luxuries" },
      20: { name: "D20 - Vimsamsa", desc: "Spiritual Progress" },
      24: { name: "D24 - Siddhamsa", desc: "Learning & Education" },
      27: { name: "D27 - Bhamsa", desc: "Strengths & Vulnerabilities" },
      30: { name: "D30 - Trimsamsa", desc: "Misfortunes & Health" },
      40: { name: "D40 - Khavedamsa", desc: "Maternal Lineage" },
      45: { name: "D45 - Akshavedamsa", desc: "Paternal Lineage" },
      60: { name: "D60 - Shashtiamsa", desc: "Past Life Karma" }
    };

    let currentCalculatedData = null;
    let selectedVarga = 9;

    // Classical Parashari Varga Longitude & Sign Calculation Engine
    function calculateVargaSign(longitude, varga) {
      longitude = (longitude % 360 + 360) % 360;
      const signIndex = Math.floor(longitude / 30);
      const degInSign = longitude % 30;

      switch(varga) {
        case 1:
          return signIndex;

        case 2: // D2 Hora
          const isOdd = (signIndex % 2 === 0);
          if (degInSign < 15) {
            return isOdd ? 4 : 3;
          } else {
            return isOdd ? 3 : 4;
          }

        case 3: // D3 Drekkana
          const partD3 = Math.floor(degInSign / 10);
          return (signIndex + partD3 * 4) % 12;

        case 4: // D4 Chaturthamsa
          const partD4 = Math.floor(degInSign / 7.5);
          return (signIndex + partD4 * 3) % 12;

        case 7: // D7 Saptamsa
          const partD7 = Math.floor(degInSign / (30/7));
          return (signIndex % 2 === 0) ? (signIndex + partD7) % 12 : (signIndex + 6 + partD7) % 12;

        case 9: // D9 Navamsa
          const partD9 = Math.floor(degInSign / (30/9));
          let startSignD9 = 0;
          if ([0, 4, 8].includes(signIndex)) startSignD9 = 0;
          else if ([1, 5, 9].includes(signIndex)) startSignD9 = 9;
          else if ([2, 6, 10].includes(signIndex)) startSignD9 = 6;
          else startSignD9 = 3;
          return (startSignD9 + partD9) % 12;

        case 10: // D10 Dasamsa
          const partD10 = Math.floor(degInSign / 3);
          return (signIndex % 2 === 0) ? (signIndex + partD10) % 12 : (signIndex + 8 + partD10) % 12;

        case 12: // D12 Dwadasamsa
          const partD12 = Math.floor(degInSign / 2.5);
          return (signIndex + partD12) % 12;

        case 16: // D16 Shodasamsa
          const partD16 = Math.floor(degInSign / (30/16));
          let startD16 = 0;
          if ([0, 3, 6, 9].includes(signIndex)) startD16 = 0;
          else if ([1, 4, 7, 10].includes(signIndex)) startD16 = 4;
          else startD16 = 8;
          return (startD16 + partD16) % 12;

        case 20: // D20 Vimsamsa
          const partD20 = Math.floor(degInSign / 1.5);
          let startD20 = 0;
          if ([0, 3, 6, 9].includes(signIndex)) startD20 = 0;
          else if ([1, 4, 7, 10].includes(signIndex)) startD20 = 8;
          else startD20 = 4;
          return (startD20 + partD20) % 12;

        case 24: // D24 Siddhamsa
          const partD24 = Math.floor(degInSign / 1.25);
          return (signIndex % 2 === 0) ? (4 + partD24) % 12 : (3 + partD24) % 12;

        case 27: // D27 Bhamsa
          const partD27 = Math.floor(degInSign / (30/27));
          let startD27 = 0;
          if ([0, 4, 8].includes(signIndex)) startD27 = 0;
          else if ([1, 5, 9].includes(signIndex)) startD27 = 3;
          else if ([2, 6, 10].includes(signIndex)) startD27 = 6;
          else startD27 = 9;
          return (startD27 + partD27) % 12;

        case 30: // D30 Trimsamsa
          if (signIndex % 2 === 0) {
            if (degInSign < 5) return 0;
            else if (degInSign < 10) return 10;
            else if (degInSign < 18) return 8;
            else if (degInSign < 25) return 2;
            else return 1;
          } else {
            if (degInSign < 5) return 1;
            else if (degInSign < 10) return 2;
            else if (degInSign < 18) return 8;
            else if (degInSign < 25) return 10;
            else return 0;
          }

        case 40: // D40 Khavedamsa
          const partD40 = Math.floor(degInSign / 0.75);
          return (signIndex % 2 === 0) ? (0 + partD40) % 12 : (6 + partD40) % 12;

        case 45: // D45 Akshavedamsa
          const partD45 = Math.floor(degInSign / (30/45));
          let startD45 = 0;
          if ([0, 3, 6, 9].includes(signIndex)) startD45 = 0;
          else if ([1, 4, 7, 10].includes(signIndex)) startD45 = 4;
          else startD45 = 8;
          return (startD45 + partD45) % 12;

        case 60: // D60 Shashtiamsa
          const partD60 = Math.floor(degInSign / 0.5);
          return (signIndex + partD60) % 12;

        default:
          return signIndex;
      }
    }

    async function calculateChart() {
      const dob = document.getElementById('dob').value;
      const tob = document.getElementById('tob').value;
      const tz = parseFloat(document.getElementById('tz').value);

      const formData = new FormData();
      formData.append('name', document.getElementById('name').value);
      formData.append('dob', dob);
      formData.append('tob', tob);
      formData.append('tz_offset', tz);

      try {
        const res = await fetch('/calculate-birth-chart', { method: 'POST', body: formData });
        
        if (!res.ok) {
          // Fallback calculation in frontend if endpoint isn't returning
          generateFallbackPositions(dob, tob);
          return;
        }

        const data = await res.json();

        if (data.status === 'success') {
          currentCalculatedData = {
            Lagna: data.ascendant,
            Sun: data.positions.sun,
            Moon: data.positions.moon,
            Mars: data.positions.mars,
            Mercury: data.positions.mercury,
            Jupiter: data.positions.jupiter,
            Venus: data.positions.venus,
            Saturn: data.positions.saturn,
            Rahu: data.positions.rahu,
            Ketu: data.positions.ketu
          };
          updateDashboard();
        } else {
          generateFallbackPositions(dob, tob);
        }
      } catch (err) {
        generateFallbackPositions(dob, tob);
      }
    }

    function generateFallbackPositions(dob, tob) {
      const seed = new Date(`${dob}T${tob}`).getTime() || 800000000000;
      const rawSun = (seed / 86400000 * 0.9856) % 360;
      currentCalculatedData = {
        Lagna: (seed / 100000) % 360,
        Sun: rawSun,
        Moon: (seed / 86400000 * 13.176) % 360,
        Mars: (rawSun + 45) % 360,
        Mercury: (rawSun + 15) % 360,
        Jupiter: (rawSun + 120) % 360,
        Venus: (rawSun - 30 + 360) % 360,
        Saturn: (rawSun + 200) % 360,
        Rahu: (rawSun + 280) % 360,
        Ketu: (rawSun + 100) % 360
      };
      updateDashboard();
    }

    function renderSouthChart(containerId, lagnaSign, planetSignMap) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';

      const gridPositions = {
        11: [1, 1], 0: [1, 2], 1: [1, 3], 2: [1, 4],
        10: [2, 1],                       3: [2, 4],
        9:  [3, 1],                       4: [3, 4],
        8:  [4, 1], 7: [4, 2], 6: [4, 3], 5: [4, 4]
      };

      for (let s = 0; s < 12; s++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        const [r, c] = gridPositions[s];
        cell.style.gridRow = r;
        cell.style.gridColumn = c;

        const signNum = document.createElement('span');
        signNum.className = 'sign-num';
        signNum.innerText = SIGNS[s].substring(0, 3);
        cell.appendChild(signNum);

        if (s === lagnaSign) {
          const lagnaBadge = document.createElement('span');
          lagnaBadge.className = 'lagna-badge';
          lagnaBadge.innerText = 'Asc / Lagna';
          cell.appendChild(lagnaBadge);
        }

        if (planetSignMap[s]) {
          planetSignMap[s].forEach(p => {
            const pTag = document.createElement('span');
            pTag.className = 'planet-tag' + (p.isVargottama ? ' vargottama' : '');
            pTag.innerText = p.name + (p.isVargottama ? ' ★' : '');
            cell.appendChild(pTag);
          });
        }

        container.appendChild(cell);
      }

      const center = document.createElement('div');
      center.className = 'cell-center';
      center.innerHTML = containerId === 'd1Chart' ? 'D1 Rashi Chart' : `Divisional Chart<br><span style="color:var(--accent); font-size:1.1rem;">D${selectedVarga}</span>`;
      container.appendChild(center);
    }

    function selectVarga(v) {
      selectedVarga = v;
      document.querySelectorAll('.varga-btn').forEach(btn => {
        btn.classList.toggle('active', parseInt(btn.dataset.varga) === v);
      });
      updateDashboard();
    }

    function updateDashboard() {
      if (!currentCalculatedData) return;

      const raw = currentCalculatedData;

      // D1 Positions
      const d1LagnaSign = calculateVargaSign(raw.Lagna, 1);
      const d1PlanetSigns = {};
      const planetKeys = ["Sun", "Moon", "Mars", "Mercury", "Jupiter", "Venus", "Saturn", "Rahu", "Ketu"];

      planetKeys.forEach(p => {
        d1PlanetSigns[p] = calculateVargaSign(raw[p], 1);
      });

      const d1Map = {};
      planetKeys.forEach(p => {
        const s = d1PlanetSigns[p];
        if (!d1Map[s]) d1Map[s] = [];
        d1Map[s].push({ name: p, isVargottama: false });
      });

      renderSouthChart('d1Chart', d1LagnaSign, d1Map);

      // Selected Varga Positions (WITH VARGA LAGNA)
      const vargaLagnaSign = calculateVargaSign(raw.Lagna, selectedVarga);
      const vargaPlanetSigns = {};
      const vargaMap = {};

      planetKeys.forEach(p => {
        const s = calculateVargaSign(raw[p], selectedVarga);
        vargaPlanetSigns[p] = s;
        const isVargottama = (s === d1PlanetSigns[p]);

        if (!vargaMap[s]) vargaMap[s] = [];
        vargaMap[s].push({ name: p, isVargottama: isVargottama });
      });

      renderSouthChart('vargaChart', vargaLagnaSign, vargaMap);

      document.getElementById('vargaTitle').innerText = `${VARGAS[selectedVarga].name} (${VARGAS[selectedVarga].desc})`;
      document.getElementById('vargaLagnaInfo').innerText = `Varga Lagna: ${SIGNS[vargaLagnaSign]}`;

      // Table Render
      const tbody = document.getElementById('planetTable');
      tbody.innerHTML = '';

      planetKeys.forEach(p => {
        const d1Sign = d1PlanetSigns[p];
        const vSign = vargaPlanetSigns[p];
        const isVargottama = (d1Sign === vSign);
        const houseInVarga = ((vSign - vargaLagnaSign + 12) % 12) + 1;

        const deg = raw[p] % 30;
        const degStr = `${Math.floor(deg)}° ${Math.floor((deg % 1) * 60)}'`;

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><strong>${p}</strong></td>
          <td>${degStr}</td>
          <td>${SIGNS[d1Sign]}</td>
          <td><strong>${SIGNS[vSign]}</strong></td>
          <td>House ${houseInVarga}</td>
          <td>${isVargottama ? '<span class="badge badge-vargottama">Vargottama ★</span>' : '-'}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function initUI() {
      const vBtnContainer = document.getElementById('vargaButtons');
      Object.keys(VARGAS).forEach(v => {
        const btn = document.createElement('button');
        btn.className = 'varga-btn' + (parseInt(v) === selectedVarga ? ' active' : '');
        btn.dataset.varga = v;
        btn.innerText = `D${v}`;
        btn.onclick = () => selectVarga(parseInt(v));
        vBtnContainer.appendChild(btn);
      });

      calculateChart();
    }

    window.onload = initUI;
  </script>
</body>
</html>
